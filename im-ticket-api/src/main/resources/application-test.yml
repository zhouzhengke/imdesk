server:
  port: 8082

spring:
  application:
    name: im-ticket

  # ── 测试环境数据源 (Docker MySQL) ──
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/im_ticket?characterEncoding=UTF-8&connectionTimeZone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root123
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  # ── SQL 初始化 ──
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init.sql
      data-locations: classpath:db/test-data.sql
      continue-on-error: false

  # ── 测试环境 Redis (Docker) ──
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 2

  # ── 测试环境 RabbitMQ (Docker) ──
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        concurrency: 1
        max-concurrency: 3
        retry:
          enabled: false

  # ── 测试环境关闭 Elasticsearch 自动配置（如不需要）──
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchTransportClientAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.company.imticket: DEBUG
    org.springframework.test: INFO
    org.springframework.jdbc.datasource.init: DEBUG

# ── 业务配置（测试环境简化）──
im:
  channel:
    wecom:
      corp-id: test-corp-id
      secret: test-secret
      token: test-token
      encoding-aes-key: test-aes-key-32-chars-long!!
    feishu:
      app-id: test-app-id
      app-secret: test-app-secret
      verification-token: test-verification-token
  duty:
    timeout-minutes: 2
  knowledge:
    escalation-rounds: 3
